<style>
  :root{
    --paper: #F5F4EF;
    --panel: #FFFFFF;
    --ink: #1C1B18;
    --ink-soft: #57534A;
    --line: #DBD7C9;
    --safety: #F4B400;
    --safety-deep: #B98600;
    --danger: #B3261E;
    --success: #2F6F4E;

    --font-display: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;
    --font-body: 'Inter', 'Segoe UI', Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;

    --max: 1120px;
    --radius: 4px;
    --stripe-h: 6px;
  }

  *,*::before,*::after{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    *,*::before,*::after{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  img{ max-width:100%; display:block; }
  a{ color: inherit; }

  h1,h2,h3{
    font-family: var(--font-display);
    line-height: 1.12;
    margin: 0 0 0.5em 0;
    letter-spacing: -0.01em;
  }

  p{ margin: 0 0 1em 0; }

  .wrap{
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 20px;
  }

  section{ scroll-margin-top: 64px; }

  /* ---------- signature: hazard stripe ---------- */
  .hazard-stripe{
    height: var(--stripe-h);
    width: 100%;
    background: repeating-linear-gradient(
      45deg,
      var(--ink) 0 10px,
      var(--safety) 10px 20px
    );
  }

  /* ---------- eyebrow / mono tag ---------- */
  .tag{
    display:inline-block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 0.35em 0.7em;
    border: 1px solid var(--ink);
    border-radius: 2px;
    background: transparent;
    color: var(--ink);
  }
  .tag.tag-safety{ border-color: var(--safety-deep); background: var(--safety); }

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap: 0.5em;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    text-decoration:none;
    border-radius: var(--radius);
    padding: 0.95em 1.5em;
    border: 2px solid var(--ink);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn:focus-visible{ outline: 3px solid var(--safety-deep); outline-offset: 2px; }

  .btn-primary{
    background: var(--safety);
    color: var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .btn-primary:hover{ box-shadow: 6px 6px 0 var(--ink); }

  .btn-full{ width: 100%; }

  /* ---------- header ---------- */
  .site-header{
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
  }
  .site-header .wrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top: 14px;
    padding-bottom: 14px;
  }
  .brand{
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    text-decoration:none;
    color: var(--ink);
  }
  .brand span{ color: var(--safety-deep); }
  .header-nav{ display:flex; align-items:center; gap: 22px; }
  .nav-link{
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-decoration: none;
    color: var(--ink-soft);
  }
  .nav-link:hover{ color: var(--ink); }
  .header-cta{
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--ink);
    border-bottom: 2px solid var(--safety);
    padding-bottom: 2px;
  }

  /* ---------- hero ---------- */
  .hero{ padding: 48px 0 40px; }
  .hero-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 36px;
    align-items: center;
  }
  .hero-eyebrow{ margin-bottom: 18px; }
  .hero h1{
    font-size: clamp(2rem, 5.4vw + 0.6rem, 3.15rem);
    animation: rise 0.6s ease both;
  }
  .hero .lede{
    font-size: 1.08rem;
    color: var(--ink-soft);
    max-width: 46ch;
    animation: rise 0.6s ease 0.08s both;
  }
  .hero-cta-row{
    display:flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 22px;
    animation: rise 0.6s ease 0.16s both;
  }
  .trust-line{
    font-size: 0.88rem;
    color: var(--ink-soft);
  }
  .trust-line strong{ color: var(--ink); }

  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* ---------- mockup panel (placeholder screenshot) ---------- */
  .mockup-shell{
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 8px 8px 0 var(--line);
    overflow:hidden;
    animation: rise 0.7s ease 0.2s both;
  }
  .mockup-topbar{
    display:flex;
    align-items:center;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .mockup-dot{ width:9px; height:9px; border-radius:50%; background: var(--line); }
  .mockup-topbar .mockup-cap{
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }
  .mockup-body{ padding: 20px; }
  .mockup-body h3{
    font-size: 0.95rem;
    margin-bottom: 4px;
  }
  .mockup-body .mockup-sub{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--ink-soft);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .track-row{
    display:grid;
    grid-template-columns: 1fr auto;
    gap: 4px 10px;
    align-items:center;
    margin-bottom: 12px;
  }
  .track-label{ font-size: 0.82rem; }
  .track-pct{ font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-soft); }
  .track-bar{
    grid-column: 1 / -1;
    height: 7px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .track-bar > span{ display:block; height:100%; }
  .fill-strong{ background: var(--success); }
  .fill-mid{ background: var(--safety); }
  .fill-weak{ background: var(--danger); }

  /* ---------- origin story ---------- */
  .origin-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 28px;
    align-items: start;
  }
  .origin-text h2{ font-size: clamp(1.4rem, 2.6vw + 0.6rem, 1.9rem); margin-top: 14px; }
  .origin-text p{ color: var(--ink-soft); }
  .origin-text em{ font-style: normal; color: var(--ink); font-weight: 600; }

  .origin-quiz-mock{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
  }
  .quiz-mock-top{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }
  .quiz-q{ font-weight: 600; margin-bottom: 12px; }
  .quiz-opt{
    display:flex;
    gap: 10px;
    align-items:flex-start;
    font-size: 0.92rem;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 8px;
    background: var(--paper);
  }
  .quiz-opt-bad{ border-color: var(--danger); background: #FBEEEC; text-decoration: line-through; text-decoration-color: var(--danger); }
  .quiz-caption{
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    margin: 12px 0 0;
  }

  /* ---------- generic section heading ---------- */
  .section-head{ max-width: 60ch; margin-bottom: 32px; }
  .section-head h2{ font-size: clamp(1.5rem, 2.6vw + 0.6rem, 2.1rem); }
  .section-head p{ color: var(--ink-soft); }

  .section-pad{ padding: 56px 0; }
  .section-pad.alt{ background: var(--panel); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }

  /* ---------- benefits ---------- */
  .benefits-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .benefit-card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
  }
  .benefit-card .tag{ margin-bottom: 12px; }
  .benefit-card h3{ font-size: 1.05rem; margin-bottom: 6px; }
  .benefit-card p{ color: var(--ink-soft); font-size: 0.95rem; margin-bottom: 0; }

  /* ---------- differentiation ---------- */
  .diff-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--panel);
  }
  .diff-col{ padding: 26px 24px; }
  .diff-col.legacy{ background: #F0EEE6; color: var(--ink-soft); }
  .diff-col.legacy h3{ color: var(--ink-soft); }
  .diff-col.current{ border-top: 3px solid var(--safety); }
  .diff-col h3{
    font-family: var(--font-mono);
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }
  .diff-list{ list-style:none; margin:0; padding:0; }
  .diff-list li{
    display:flex;
    gap: 10px;
    font-size: 0.92rem;
    padding: 8px 0;
    border-top: 1px dashed var(--line);
  }
  .diff-list li:first-child{ border-top:none; }
  .diff-mark{ font-family: var(--font-mono); font-weight:700; flex-shrink:0; }
  .legacy .diff-mark{ color: var(--danger); }
  .current .diff-mark{ color: var(--success); }
  .diff-closing{
    margin-top: 22px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  /* ---------- pricing ---------- */
  .pricing-wrap{ display:flex; justify-content:center; }
  .pricing-card{
    position: relative;
    max-width: 440px;
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 30px 26px 30px 40px;
    overflow: hidden;
  }
  .pricing-card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 16px;
    background: var(--safety);
    background-image: radial-gradient(circle at 8px 8px, var(--panel) 0 5px, transparent 5px);
    background-size: 16px 18px;
    background-repeat: repeat-y;
  }
  .price-row{
    display:flex;
    align-items: baseline;
    gap: 10px;
    margin: 10px 0 2px;
  }
  .price-amount{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 3rem;
  }
  .price-amount.price-old{
    color: var(--ink-soft);
    font-size: 1.7rem;
    font-weight: 600;
    text-decoration: line-through;
    text-decoration-color: var(--danger);
    text-decoration-thickness: 2px;
  }
  .price-amount.price-new{ color: var(--danger); }
  .price-terms{ color: var(--ink-soft); font-size: 0.92rem; margin-bottom: 18px; }
  .price-includes{ list-style:none; margin: 0 0 20px; padding:0; }
  .price-includes li{
    display:flex; gap:8px;
    font-size: 0.92rem;
    padding: 6px 0;
    border-top: 1px dashed var(--line);
  }
  .price-includes li:first-child{ border-top:none; }
  .price-check{ color: var(--success); font-weight:700; font-family: var(--font-mono); }
  .price-frame{
    font-size: 0.9rem;
    color: var(--ink-soft);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 20px;
  }
  .price-micro{
    text-align:center;
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 12px;
  }

  /* ---------- waitlist form ---------- */
  .form-card{
    max-width: 480px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 24px;
    text-align:center;
  }
  .form-card h2{ font-size: 1.4rem; }
  .form-card .lede{ color: var(--ink-soft); font-size: 0.95rem; }
  .field-row{
    display:flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
  }
  input[type="email"]{
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 0.85em 1em;
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
  }
  input[type="email"]:focus-visible{ outline: 3px solid var(--safety-deep); outline-offset: 1px; }
  .form-micro{
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }
  .hp-field{ position:absolute; left:-9999px; top:-9999px; }

  /* ---------- FAQ ---------- */
  .faq-list{ max-width: 760px; }
  details{
    border-bottom: 1px solid var(--line);
    padding: 16px 2px;
  }
  details:first-child{ border-top: 1px solid var(--line); }
  summary{
    cursor:pointer;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.02rem;
    list-style: none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 12px;
  }
  summary::-webkit-details-marker{ display:none; }
  summary::after{
    content: "+";
    font-family: var(--font-mono);
    font-size: 1.2rem;
    color: var(--safety-deep);
    flex-shrink:0;
  }
  details[open] summary::after{ content: "–"; }
  .faq-answer{
    margin-top: 10px;
    color: var(--ink-soft);
    font-size: 0.95rem;
    max-width: 65ch;
  }

  /* ---------- footer ---------- */
  .site-footer{ padding: 40px 0 60px; }
  .footer-disclaimer{
    font-family: var(--font-mono);
    font-size: 0.76rem;
    line-height: 1.6;
    color: var(--ink-soft);
    max-width: 70ch;
    border-top: 1px solid var(--line);
    padding-top: 20px;
  }
  .footer-signature{
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  /* ---------- tablet ---------- */
  @media (min-width: 640px){
    .benefits-grid{ grid-template-columns: 1fr 1fr; }
    .diff-grid{ grid-template-columns: 1fr 1fr; }
    .diff-col.current{ border-top:none; border-left: 3px solid var(--safety); }
  }

  /* ---------- desktop ---------- */
  @media (min-width: 980px){
